### configure Tmux Plugin Manager
set-environment -gF TMUX_PLUGIN_MANAGER_PATH '#{HOME}/.config/tmux/plugins/'

if 'test ! -d "${TMUX_PLUGIN_MANAGER_PATH}/tpm"' {
  run 'mkdir -p "${TMUX_PLUGIN_MANAGER_PATH}"'
  run 'git clone https://github.com/tmux-plugins/tpm "${TMUX_PLUGIN_MANAGER_PATH}/tpm"'
  run '${TMUX_PLUGIN_MANAGER_PATH}/tpm/bin/install_plugins'
}

### Plugins
set -g @plugin 'tmux-plugins/tpm'

### theme / style
set -g @plugin 'catppuccin/tmux'
# set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'

### Tools

### prefix + o
set -g @plugin 'omerxx/tmux-sessionx'

### prefix + space
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-copycat'

### prefix + s ; Rave Session
### prefix + r ; Restore Session
set -g @plugin 'tmux-plugins/tmux-resurrect'

### Logging : prefix + shift + p
### Screen Capture : prefix + alt + p
### Save complete history : prefix + alt + shift + p
set -g @plugin 'tmux-plugins/tmux-logging'
set -g @plugin 'tmux-plugins/tmux-continuum'

### Configure Plugins

### ===========================================================================================================================
### Catppuccin Configuration
### https://github.com/catppuccin/tmux
set -g @catppuccin_flavor 'mocha'

# Ref : https://github.com/catppuccin/tmux/discussions/317#discussioncomment-12731361
set -g @catppuccin_window_current_number ""
set -g @catppuccin_window_current_number_color "#{E:@thm_peach}"
set -g @catppuccin_window_current_text "#[fg=#{@thm_peach},bg=#{@thm_surface_1}]#I#[fg=#{@thm_surface_1},bg=#{@thm_peach}] #[fg=#{@thm_mantle},bg=#{@thm_peach}]#{?#{!=:#{window_name},}, #W,}"

set -g @catppuccin_window_number ""
set -g @catppuccin_window_number_color "#{E:@thm_surface_0}"
set -g @catppuccin_window_text "#[fg=#{@thm_rosewater},bg=#{@thm_surface_0}] #I#{?#{!=:#{window_name},},  #W,}"

set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_flags "icon"

set -g @catppuccin_status_background '#0C0C0C'
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator " "

# pane status
set -g @catppuccin_pane_status_enabled "yes"
set -g @catppuccin_pane_border_status "yes"
set -g @catppuccin_pane_border_style "fg=#45475a"
set -g @catppuccin_pane_active_border_style "fg=#{@thm_blue}"
set -g @catppuccin_pane_color "##{?pane_active,#{@thm_blue},#{@thm_bg}}"
set -g @catppuccin_pane_background_color "##{?pane_active,#{@thm_surface_1},#{@thm_surface_2}}"
set -g @catppuccin_pane_left_separator ""
# set -g @catppuccin_pane_middle_separator "||"
set -g @catppuccin_pane_right_separator ""
set -g @catppuccin_pane_default_text "##{?pane_active, ##{pane_current_command} ,}"
# set -g @catppuccin_pane_default_fill "all"
# set -g @catppuccin_pane_number_position "left"
### ===========================================================================================================================

### source the plugin here
run '#{TMUX_PLUGIN_MANAGER_PATH}/tmux/catppuccin.tmux'

### pane borders
# Let Catppuccin render the pane badge; only control when the border row is shown.
set-window-option -g pane-border-status off
set-hook -g after-split-window 'set-window-option pane-border-status top'
set-hook -g after-kill-pane 'if-shell -F "#{==:#{window_panes},1}" "set-window-option pane-border-status off" "set-window-option pane-border-status top"'
set-hook -g window-layout-changed 'if-shell -F "#{==:#{window_panes},1}" "set-window-option pane-border-status off" "set-window-option pane-border-status top"'
set-hook -g session-window-changed 'if-shell -F "#{==:#{window_panes},1}" "set-window-option pane-border-status off" "set-window-option pane-border-status top"'
# Apply immediately on config reload so the current window does not keep a stale
# local `pane-border-status` from an older config.
# if-shell -F '#{==:#{window_panes},1}' 'set-window-option pane-border-status off' 'set-window-option pane-border-status top'

### general config
### set left and right status bar
set -g allow-rename yes
set -g status-position top
set -g status-interval 5
set -g status-left-length 100
set -g status-right-length 100
set -g status-left '#{E:@catppuccin_status_session}'
set -g status-right '#{E:@catppuccin_mouse_mode} '
set -ag status-right '#{E:@catppuccin_status_application}'
set -g history-limit 99999999

### start index at 1
set -g base-index 1
set -g pane-base-index 1

### renumber when window is closed
set -g renumber-window on

### enable 256-colors
# 256 colors + true color for Neovim
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",tmux-256color:RGB"

# reduce Esc / Alt-key delay
set -sg escape-time 10

# allow Neovim focus/autoread events
set -g focus-events on

set-window-option -g mode-keys vi

set-option -g set-clipboard external

set-option -g update-environment "DISPLAY SSH_ASKPASS SSH_AUTH_SOCK SSH_CONNECTION SSH_CLIENT"

set -g mouse on
set -g @catppuccin_mouse_mode "🖱️⭕"

### Key Binding
unbind r
bind-key r source-file ~/.config/tmux/tmux.conf

### set ctrl-a as second prefix
set -g prefix2 C-a
bind-key C-a send-prefix -2

bind-key '-' split-window -v -c '#{pane_current_path}'
bind-key '\' split-window -h -c '#{pane_current_path}'

bind-key c new-window -c '#{pane_current_path}'

bind-key S command-prompt -p "New Session Name:" "new-session -s '%%'"
# bind-key S command-prompt -p "New Session Name:" -I "#(tmux ls 2>/dev/null | wc -l | awk '{print $1 + 1}')" "new-session -s '%%'"
# bind-key S command-prompt -p "New Session Name:" -I "#(i=1; while tmux has-session -t \$i 2>/dev/null; do i=\$((i+1)); done; echo \$i)" "new-session -s '%%'"

bind-key a if -F '#{mouse}' \
    'run-shell "tmux set -g mouse off; tmux set -g @catppuccin_mouse_mode \"🖱️❌\""' \
    'run-shell "tmux set -g mouse on; tmux set -g @catppuccin_mouse_mode \"🖱️⭕\""'
#'

bind-key j display-message "Choose a pane to join current pane" \;\
  choose-tree -s -Z -w "join-pane -s '%%'"

bind-key J display-message "Choose a pane to move current pane into" \;\
  choose-tree -s -Z -w "join-pane -t '%%'"

# bind-key -r Left    resize-pane -L 2
# bind-key -r Right   resize-pane -R 2
# bind-key -r Up      resize-pane -U 2
# bind-key -r Down    resize-pane -D 2

bind-key -n M-h select-pane -L
bind-key -n M-j select-pane -D
bind-key -n M-k select-pane -U
bind-key -n M-l select-pane -R

# bind -n M-h select-layout even-horizontal
# bind -n M-v select-layout even-vertical
bind-key -n M-t select-layout tiled
bind-key -n M-'\' run-shell "tmux swap-pane -t 1; tmux select-pane -t 1; tmux select-layout main-horizontal"
bind-key -n M-'-' run-shell "tmux swap-pane -t 1; tmux select-pane -t 1; tmux select-layout main-vertical"

bind-key -n C-M-n swap-window -t +1 -d
bind-key -n C-M-p swap-window -t -1 -d

bind-key -n M-n next-window
bind-key -n M-p previous-window

bind-key -n M-s switch-client -n
bind-key -n M-S switch-client -p
bind-key -n M-b switch-client -l

bind-key -n M-z resize-pane -Z

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

### restore vim/nvim sessions
### Ref. https://github.com/tmux-plugins/tmux-resurrect/blob/master/docs/restoring_vim_and_neovim_sessions.md
### 'session' settings rely on tpope/vim-obsession to enable session saving and restoration for Vim/Neovim.
### but now nvim is using auto-ression, the following settings is not working now.

### restore vim sessions
set -g @resurrect-strategy-vim 'session' # 會保存 vim 檔案的 session
### restore neovim sessions
set -g @resurrect-strategy-nvim 'session' # 會保存 nvim 檔案 session
### restore panes
set -g @resurrect-capture-pane-contents 'on'

# initialize tmux plugin manager and source all plugins
run '#{TMUX_PLUGIN_MANAGER_PATH}/tpm/tpm'
